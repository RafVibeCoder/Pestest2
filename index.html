<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GitHub Crazy Soccer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>GitHub Crazy Soccer</h1>
    <div class="subtitle">Arcade match · WASD + Space to shoot</div>
  </header>

  <main>
    <section id="stadium">
      <canvas id="pitch" width="960" height="540"></canvas>
    </section>

    <section id="hud">
      <div id="scoreHud">Home 0 - 0 Away</div>
      <div id="timeHud">00:00</div>
      <button id="restartBtn">Restart Match</button>
      <div class="controls">
        <p><strong>Controls:</strong></p>
        <p>Move: W / A / S / D</p>
        <p>Shoot: Space (toward goal)</p>
      </div>
    </section>
  </main>

  <footer>
    Built for GitHub Pages · Crazy arcade soccer · Expand it, fork it, break it.
  </footer>

  <script src="game.js"></script>
</body>
</html>
